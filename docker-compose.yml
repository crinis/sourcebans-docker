version: '3'
services:
  web:
    image: crinis/sourcebans:latest
    environment:
      # SourceBans++ is installed automatically on first start.
      # Set INSTALL to 'true' for a single start to force-update the sources
      # (overwrites themes/default, updater, install, pages and includes),
      # then set it back to 'false'. Always create a backup first.
      INSTALL: 'false'
      # Set this to 'true' if you are starting the container as root and want to change the owner of the files to the webserver user.
      SET_OWNER: 'true'
    networks:
      - db
    ports:
    # Change the port before the colon to whatever you want to use.
    - 80:8080
    volumes:
      - sourcebans:/var/www/html/
    # You can enable the following three lines to run the container as a different user. For example when using podman.
    #  - sourcebans:/var/www/html/:z
    # user: ${DOCKER_UID:-1000}:${DOCKER_GID:-1000}
    # userns_mode: "keep-id"
  db:
    image: mariadb:10
    environment:
      MYSQL_USER: sourcebans
      MYSQL_PASSWORD: ThisShouldBeAStrongPassword
      MYSQL_DATABASE: sourcebans
      MYSQL_ROOT_PASSWORD: ThisShouldBeAStrongPassword
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - db

networks:
  db:

volumes:
  sourcebans:
  mysql:
